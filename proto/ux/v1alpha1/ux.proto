edition = "2024";

package ux.v1alpha1;

import "ux/v1alpha1/config.proto";

service UxService {
  rpc Invoke(InvokeRequest) returns (InvokeResponse);
}

message InvokeRequest {
  Config config = 1;
  bytes ux_file = 2;
}

message InvokeMessage {
  repeated string lines = 1;
  string level = 2;
}

message InvokeResponse {
  repeated Link links = 1;
  map<string, InvokeMessage> messages = 2;
}
