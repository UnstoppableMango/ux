edition = "2024";

package ux.v1alpha1;

message Config {
  map<string, Source> sources = 1;
  map<string, string> builders = 2;
  map<string, Generate> generate = 3;
  oneof out {
    string path = 10;
  }
}

message Generate {
  string builder = 1;
  map<string, string> config = 2;
}

message Source {
  string name = 1;
  oneof src {
    Flake flake = 10;
    Git git = 11;
    Oci oci = 12;
  }

  message Flake {
    string installable = 1;
  }

  message Git {
    string url = 1;
    string rev = 2;
  }

  message Oci {
    string url = 1;
  }
}
