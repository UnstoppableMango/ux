edition = "2024";

package ux.v1alpha1;

message Config {
  map<string, Registry> registries = 1;
  map<string, string> builders = 2;
  map<string, Generate> generate = 3;
  oneof out {
    string path = 10;
  }
}

message Generate {
  string builder = 1;
  map<string, string> config = 2;
}

message Registry {
  string name = 1;
  oneof src {
    FlakeRegistry flake = 10;
    GitRegistry git = 11;
    OciRegistry oci = 12;
  }
}

message FlakeRegistry {
  string url = 1;
}

message GitRegistry {
  string url = 1;
  string rev = 2;
}

message OciRegistry {
  string url = 1;
}
