edition = "2024";

package ux.v1alpha1;

import "ux/v1alpha1/nix.proto";

message Config {
  repeated Repo repos = 1;
  repeated Link links = 2;
}

message FlakeRepo {
  string url = 1;
}

message GitRepo {
  string url = 1;
  string rev = 2;
}

message OciRepo {
  string url = 1;
}

message Repo {
  string name = 1;
  oneof src {
    FlakeRepo flake = 10;
    GitRepo git = 11;
    OciRepo oci = 12;
  }
}

message Destination {
  string relative_path = 1;
}

message Link {
  string name = 1;
  Destination destination = 2;
  oneof source {
    Derivation derivation = 100;
  }
}
